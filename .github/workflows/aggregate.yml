name: Daily Bali News Aggregator

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run aggregator script
        run: python3 scripts/aggregate_news.py

      - name: Commit and push
        run: |
          git config user.name "Bali Kini Bot"
          git config user.email "putralock22@gmail.com"
          git pull --rebase origin main 2>/dev/null || true
          git add content/artikel/ringkasan-berita-*.md
          if git diff --staged --quiet; then
            echo "No new ringkasan today"
          else
            git commit -m "[auto] $(date '+%Y-%m-%d %H:%M') WITA — Ringkasan Berita Bali harian"
            git push
          fi
