name: Daily Bali News Aggregator

on:
  schedule:
    - cron: '0 21 * * *'  # 05:00 WITA setiap hari
  workflow_dispatch:

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch & generate ringkasan berita
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta
          import re, os

          def fetch_rss(url):
              try:
                  req = urllib.request.Request(url, headers={
                      'User-Agent': 'Mozilla/5.0 (compatible; BalikiniBot/1.0)'
                  })
                  with urllib.request.urlopen(req, timeout=15) as r:
                      return r.read().decode('utf-8', errors='replace')
              except Exception as e:
                  print(f"Error fetching {url}: {e}")
                  return None

          def clean_html(text):
              text = re.sub(r'<[^>]+>', '', text or '')
              text = re.sub(r'\s+', ' ', text).strip()
              return text[:220]

          def parse_rss(xml_content, max_items=5):
              articles = []
              if not xml_content:
                  return articles
              try:
                  xml_content = re.sub(r'&(?!(amp|lt|gt|quot|apos);)', '&amp;', xml_content)
                  root = ET.fromstring(xml_content)
                  channel = root.find('channel')
                  if channel is None:
                      return articles
                  for item in channel.findall('item')[:max_items]:
                      title = clean_html(item.findtext('title', ''))
                      link  = (item.findtext('link', '') or '').strip()
                      desc  = clean_html(item.findtext('description', ''))
                      src   = clean_html(item.findtext('source', ''))
                      if title and link and not link.startswith('#'):
                          articles.append({'title': title, 'link': link,
                                           'desc': desc, 'source': src})
              except Exception as e:
                  print(f"Parse error: {e}")
              return articles

          # Ambil waktu WITA
          wita = timezone(timedelta(hours=8))
          now  = datetime.now(wita)
          today     = now.strftime('%Y-%m-%d')
          today_idf = now.strftime('%-d %B %Y')
          bulan_id  = {
              'January':'Januari','February':'Februari','March':'Maret',
              'April':'April','May':'Mei','June':'Juni','July':'Juli',
              'August':'Agustus','September':'September','October':'Oktober',
              'November':'November','December':'Desember'
          }
          for en, id_ in bulan_id.items():
              today_idf = today_idf.replace(en, id_)

          SOURCES = [
              {
                  'name': '🏛️ Berita Resmi Pemerintah & Nasional',
                  'emoji': '🏛️',
                  'url': 'https://news.google.com/rss/search?q=bali+pemerintah+pariwisata&hl=id&gl=ID&ceid=ID:id',
                  'max': 5
              },
              {
                  'name': '📰 Tribun Bali',
                  'emoji': '📰',
                  'url': 'https://bali.tribunnews.com/rss',
                  'max': 5
              },
              {
                  'name': '🌍 Bali in International News (EN)',
                  'emoji': '🌍',
                  'url': 'https://news.google.com/rss/search?q=bali+tourism+travel&hl=en&gl=US&ceid=US:en',
                  'max': 4
              },
              {
                  'name': '💰 Ekonomi & Investasi Bali',
                  'emoji': '💰',
                  'url': 'https://news.google.com/rss/search?q=ekonomi+investasi+bali&hl=id&gl=ID&ceid=ID:id',
                  'max': 4
              },
          ]

          # Build content
          lines = [f"""---
title: "Ringkasan Berita Bali — {today_idf}"
date: {today}T05:00:00+08:00
description: "Kumpulan berita terkini seputar Bali dari berbagai media terpercaya pada {today_idf} — pariwisata, ekonomi, budaya, dan lingkungan."
categories: ["Berita"]
tags: ["ringkasan berita", "berita bali", "harian", "agregasi"]
image: "https://images.pexels.com/photos/2166559/pexels-photo-2166559.jpeg?auto=compress&cs=tinysrgb&w=1200"
image_credit: "Foto: Pexels"
---

Berikut ringkasan berita terpenting seputar Bali yang dikumpulkan dari berbagai media terpercaya pada **{today_idf}**. Klik judul untuk membaca artikel lengkap di sumber aslinya.

"""]

          total_articles = 0
          for src in SOURCES:
              xml  = fetch_rss(src['url'])
              arts = parse_rss(xml, src['max'])
              if not arts:
                  continue
              lines.append(f"## {src['name']}\n")
              for a in arts:
                  lines.append(f"### [{a['title']}]({a['link']})\n")
                  if a['desc']:
                      lines.append(f"{a['desc']}...\n")
                  src_label = f" — *{a['source']}*" if a['source'] else ''
                  lines.append(f"\n🔗 **[Baca selengkapnya →]({a['link']})**{src_label}\n\n---\n")
                  total_articles += 1

          lines.append(f"""
## ℹ️ Tentang Ringkasan Ini

Halaman ini merupakan **agregasi berita** dari berbagai media terpercaya. Bali Kini tidak mengklaim kepemilikan atas konten yang ditautkan — semua kredit milik media sumber masing-masing.

- Total berita dirangkum: **{total_articles} artikel**
- Diperbarui otomatis setiap hari pukul **05:00 WITA**
- Sumber: Google News Indonesia, Tribun Bali, dan media nasional lainnya

*Untuk berita eksklusif dan analisis data Bali, baca [artikel asli Bali Kini](/artikel/).*
""")

          content  = '\n'.join(lines)
          filename = f"content/artikel/ringkasan-berita-bali-{today}.md"

          # Cek apakah file sudah ada hari ini
          if os.path.exists(filename):
              print(f"Already exists: {filename}")
          else:
              os.makedirs('content/artikel', exist_ok=True)
              with open(filename, 'w', encoding='utf-8') as f:
                  f.write(content)
              print(f"✅ Created: {filename} ({total_articles} articles)")

          PYEOF

      - name: Commit & push
        run: |
          git config user.name "Bali Kini Bot"
          git config user.email "putralock22@gmail.com"
          git pull --rebase origin main 2>/dev/null || true
          git add content/artikel/ringkasan-berita-*.md
          if git diff --staged --quiet; then
            echo "No new articles today"
          else
            git commit -m "[auto] $(date '+%Y-%m-%d') — Ringkasan Berita Bali harian dari $(date '+%H:%M') WITA"
            git push
          fi
