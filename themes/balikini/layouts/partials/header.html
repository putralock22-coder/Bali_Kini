<header class="site-header">
  <div class="header-inner">
    <a href="/" class="logo">🌊 Bali Kini</a>
    <nav class="main-nav">
      <a href="/">Dashboard</a>
      <a href="/artikel/">Artikel</a>
      <a href="/#pariwisata">Pariwisata</a>
      <a href="/#ekonomi">Ekonomi</a>
      <a href="/#cuaca">Cuaca</a>
      <a href="/#event">Event</a>
      <a href="/gubernur/" style="color:var(--gold);">🏛 Gubernur</a>
    </nav>
    <div class="lang-switcher">
      {{ range site.Languages }}
      <a href="{{ .Lang | relLangURL }}" class="lang-btn {{ if eq .Lang $.Site.Language.Lang }}active{{ end }}">{{ .Params.languageName | default .Lang }}</a>
      {{ end }}
    </div>
    <div class="header-date" id="headerDate"></div>
  </div>
</header>
<script>
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('id-ID',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
</script>
