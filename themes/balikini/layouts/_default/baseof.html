<!DOCTYPE html>
<html lang="id">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <canvas id="glc"></canvas>
  <div class="vignette"></div>
  <div class="page">
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script src="{{ "js/gl.js" | relURL }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="{{ "js/modal.js" | relURL }}"></script>
  <script src="{{ "js/countdown.js" | relURL }}"></script>
  <!-- ONESIGNAL: ganti YOUR_ONESIGNAL_APP_ID dengan App ID dari onesignal.com -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "200c87cf-6426-42ca-904d-cf6f6ffa0d74",
        notifyButton: { enable: false },
        promptOptions: { slidedown: { enabled: false } }
      });
    });
  </script>
</body>
</html>
