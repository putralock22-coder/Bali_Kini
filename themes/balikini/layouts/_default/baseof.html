<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <canvas id="glc"></canvas>
  <div class="vignette"></div>
  <div class="page">
    {{ partial "header.html" . }}
    <main>
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
  </div>
  <script src="{{ "js/gl.js" | relURL }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script src="{{ "js/modal.js" | relURL }}"></script>
  <script src="{{ "js/countdown.js" | relURL }}"></script>
  <script src="{{ "js/ux.js" | relURL }}"></script>
  <!-- ONESIGNAL: ganti YOUR_ONESIGNAL_APP_ID dengan App ID dari onesignal.com -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
  <script>
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: "200c87cf-6426-42ca-904d-cf6f6ffa0d74",
        notifyButton: { enable: false },
        promptOptions: { slidedown: { enabled: false } }
      });
    });
  </script>

  <!-- Saweria Floating Bubble -->
  <div id="saweria-bubble" onclick="window.open('https://saweria.co/balikini','_blank')" title="Dukung Bali Kini">
    <img src="https://saweria.co/favicon.ico" alt="Saweria" onerror="this.style.display='none';this.parentNode.innerHTML='☕'"/>
    <span class="saweria-bubble-label">Dukung Kami</span>
  </div>
  <style>
    #saweria-bubble {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      background: linear-gradient(135deg, #ff6b35, #ff8c42);
      border-radius: 50px;
      padding: 10px 18px 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(255,107,53,0.45);
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
      border: none;
    }
    #saweria-bubble:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 8px 28px rgba(255,107,53,0.55);
    }
    #saweria-bubble img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }
    .saweria-bubble-label {
      color: #fff;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: .3px;
      white-space: nowrap;
    }
    @media(max-width:480px) {
      #saweria-bubble { padding: 10px 14px 10px 10px; bottom: 20px; right: 16px; }
      .saweria-bubble-label { font-size: 12px; }
    }
  </style>
</body>
</html>
