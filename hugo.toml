baseURL = "https://balikini.id/"
theme = "balikini"
defaultContentLanguage = "id"
defaultContentLanguageInSubdir = false

[languages]
  [languages.id]
    title = "Bali Kini"
    weight = 1
    [languages.id.params]
      languageName = "🇮🇩 Indonesia"
      description = "Portal berita & data harian Pulau Dewata — pariwisata, ekonomi, cuaca, budaya."
    [languages.id.permalinks]
      artikel = "/artikel/:slug/"

  [languages.en]
    title = "Bali Kini"
    weight = 2
    [languages.en.params]
      languageName = "🇬🇧 English"
      description = "Daily Bali news & data portal — tourism, economy, weather, culture."
    [languages.en.permalinks]
      artikel = "/en/article/:slug/"

  [languages.zh]
    title = "Bali Kini"
    weight = 3
    [languages.zh.params]
      languageName = "🇨🇳 中文"
      description = "巴厘岛每日新闻与数据门户 — 旅游、经济、天气、文化。"
    [languages.zh.permalinks]
      artikel = "/zh/wenzhang/:slug/"

[taxonomies]
  category = "categories"
  tag = "tags"

[markup.goldmark.renderer]
  unsafe = true
